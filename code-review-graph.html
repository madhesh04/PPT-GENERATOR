<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEO PPT Generator — Code Review Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0f1a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,15,26,0.95); border-bottom: 1px solid #1e3a5f;
    padding: 10px 20px; display: flex; align-items: center; gap: 16px;
  }
  #header h1 { font-size: 16px; font-weight: 700; color: #00f0ff; letter-spacing: 0.05em; }
  #header span { font-size: 12px; color: #64748b; }

  .legend { display: flex; gap: 12px; margin-left: auto; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #94a3b8; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  #svg-container { position: fixed; top: 48px; left: 0; right: 320px; bottom: 0; }
  svg { width: 100%; height: 100%; }

  #panel {
    position: fixed; top: 48px; right: 0; width: 320px; bottom: 0;
    background: rgba(10,15,26,0.97); border-left: 1px solid #1e3a5f;
    overflow-y: auto; padding: 16px;
  }
  #panel h2 { font-size: 13px; color: #00f0ff; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  #panel-content { font-size: 12px; line-height: 1.6; color: #94a3b8; }
  #panel-content h3 { color: #e2e8f0; font-size: 13px; margin-bottom: 6px; }
  #panel-content .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 600; margin: 2px; text-transform: uppercase;
  }
  #panel-content .fn-list { margin: 8px 0; }
  #panel-content .fn-item {
    display: block; padding: 4px 8px; margin: 3px 0;
    background: rgba(255,255,255,0.04); border-radius: 4px;
    border-left: 2px solid #334155; font-family: 'Consolas', monospace; font-size: 11px;
    color: #7dd3fc;
  }
  #panel-content .dep-item {
    display: block; padding: 3px 6px; margin: 2px 0;
    background: rgba(0,240,255,0.05); border-radius: 3px; font-size: 11px; color: #93c5fd;
  }
  #panel-content .risk-high { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  #panel-content .risk-med  { background: rgba(234,179,8,0.15); color: #fbbf24; border: 1px solid rgba(234,179,8,0.3); }
  #panel-content .risk-low  { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  #panel-content .section { margin-top: 12px; padding-top: 10px; border-top: 1px solid #1e3a5f; }
  #panel-content .endpoint {
    display: flex; gap: 6px; align-items: flex-start; margin: 3px 0; font-size: 11px;
  }
  #panel-content .method {
    font-weight: 700; font-size: 10px; padding: 1px 5px; border-radius: 3px; min-width: 36px; text-align: center;
  }
  .method-get  { background: rgba(34,197,94,0.2); color: #4ade80; }
  .method-post { background: rgba(59,130,246,0.2); color: #60a5fa; }

  .node circle { cursor: pointer; transition: r 0.15s; }
  .node circle:hover { opacity: 0.85; }
  .node text { pointer-events: none; font-size: 11px; fill: #e2e8f0; }
  .link { stroke-opacity: 0.5; fill: none; }

  .tooltip {
    position: fixed; background: rgba(10,15,26,0.95); border: 1px solid #334155;
    border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #e2e8f0;
    pointer-events: none; z-index: 200; max-width: 220px; display: none;
  }

  #controls {
    position: fixed; bottom: 16px; left: 16px; z-index: 100;
    display: flex; gap: 8px;
  }
  .ctrl-btn {
    background: rgba(30,58,95,0.8); border: 1px solid #334155; color: #94a3b8;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { background: #1e3a5f; color: #e2e8f0; }
</style>
</head>
<body>

<div id="header">
  <h1>NEO PPT GENERATOR — Code Review Graph</h1>
  <span>FastAPI · React 19 · Groq/NVIDIA · MongoDB · python-pptx</span>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Entry</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Backend</div>
    <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Frontend</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>DB</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>External</div>
    <div class="legend-item" style="margin-left:16px">
      <svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#3b82f6" stroke-width="1.5"/></svg>import
    </div>
    <div class="legend-item">
      <svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="4,2"/></svg>calls
    </div>
    <div class="legend-item">
      <svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/></svg>api
    </div>
    <div class="legend-item">
      <svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#a855f7" stroke-width="1.5"/></svg>contains
    </div>
  </div>
</div>

<div id="svg-container"><svg id="graph"></svg></div>
<div id="panel"><h2>Select a node</h2><div id="panel-content"><p>Click any node to inspect it.</p></div></div>
<div class="tooltip" id="tooltip"></div>

<div id="controls">
  <button class="ctrl-btn" onclick="resetZoom()">Reset View</button>
  <button class="ctrl-btn" onclick="toggleLinks()">Toggle Links</button>
</div>

<script>
const COLOR = {
  entry:    "#f97316",
  backend:  "#3b82f6",
  frontend: "#06b6d4",
  db:       "#f59e0b",
  external: "#10b981",
};
const LINK_COLOR = { import:"#3b82f6", calls:"#00f0ff", extends:"#a855f7", api:"#f59e0b" };

const nodes = [
  { id:"main.py", group:"entry", label:"main.py", size:28,
    file:"backend/main.py", lines:"~700",
    desc:"FastAPI application entry point. Configures CORS, rate limiting (slowapi), MongoDB collections, JWT auth middleware, and all API routes. Houses auth helpers and the PPT in-memory store with 5-min TTL cleanup.",
    risk:"high",
    functions:["lifespan()","get_current_user()","require_admin()","require_master()","extract_text_from_file()","_cleanup_expired_tokens()","verify_password()","get_password_hash()","create_access_token()"],
    endpoints:[
      {method:"GET",  path:"/health"},
      {method:"POST", path:"/auth/register"},
      {method:"POST", path:"/auth/login"},
      {method:"POST", path:"/generate"},
      {method:"POST", path:"/regenerate-slide"},
      {method:"POST", path:"/regenerate-image"},
      {method:"POST", path:"/upload-context"},
      {method:"POST", path:"/export-pdf"},
      {method:"POST", path:"/export-pptx"},
      {method:"GET",  path:"/presentations/me"},
      {method:"GET",  path:"/admin/stats"},
      {method:"GET",  path:"/admin/generations"},
      {method:"GET",  path:"/admin/users"},
      {method:"GET",  path:"/admin/settings"},
      {method:"POST", path:"/admin/settings"},
      {method:"GET",  path:"/download/{token}"},
    ],
    deps:["generator.py","llm_client.py","image_client.py","pdf_generator.py","MongoDB","JWT","bcrypt","slowapi"]
  },
  { id:"generator.py", group:"backend", label:"generator.py", size:20,
    file:"backend/generator.py", lines:"332",
    desc:"PPTX generation engine using python-pptx. Handles template duplication, 5-theme system, and 5 slide types: title, agenda, content (bullets + optional image), code (dedicated full slide), closing.",
    risk:"med",
    functions:["create_presentation()","_duplicate_slide_within()","_decorate_title_slide()","_decorate_agenda_slide()","_decorate_content_slide()","_decorate_code_slide()","_decorate_closing_slide()","_add_text_box()","_add_rect()"],
    deps:["template.pptx","python-pptx"],
    notes:"5 themes: neon, ocean, emerald, royal, dark. Agenda: ≤7 topics = single column, else 2-column. Code slides injected as separate full slides after parent content slide. _duplicate_slide_within() rebuilds rId maps to preserve embedded media."
  },
  { id:"llm_client.py", group:"backend", label:"llm_client.py", size:22,
    file:"backend/llm_client.py", lines:"247",
    desc:"LLM routing layer. Auto-routes to NVIDIA NIM (Kimi K2) for technical topics or Groq (LLaMA 3.3 70B) as default. Builds structured prompts and validates JSON output.",
    risk:"high",
    functions:["generate_slide_content()","_call_groq()","_call_nvidia()","_build_prompt()","_parse_and_validate()","is_technical_topic()"],
    deps:["Groq API","NVIDIA NIM API"],
    notes:"Auto-routing: checks title+topics against TECHNICAL_KEYWORDS list. NVIDIA temp capped at 0.35. Falls back to Groq on NVIDIA failure. Returns (slides[], model_used, provider). Tone presets: professional=0.5, creative=0.8, technical=0.3, educational=0.6."
  },
  { id:"image_client.py", group:"backend", label:"image_client.py", size:18,
    file:"backend/image_client.py", lines:"135",
    desc:"3-source image cascade: Freepik (real photos, paid) → Unsplash (real photos, 50 req/hr free) → Pollinations.ai (AI-generated, free). Async via httpx. Returns first successful result.",
    risk:"low",
    functions:["fetch_slide_image()","_fetch_freepik()","_fetch_unsplash()","_fetch_pollinations()"],
    deps:["Freepik API","Unsplash API","Pollinations.ai"],
    notes:"Pollinations: 60s timeout, 1344×768, flux model, minimum 5000 byte check. Unsplash: 10s + 15s image download. Freepik: 10s. All sources skipped if API key not set."
  },
  { id:"pdf_generator.py", group:"backend", label:"pdf_generator.py", size:16,
    file:"backend/pdf_generator.py",
    desc:"PDF export engine. Converts slide data to a styled PDF with theme support.",
    risk:"low",
    functions:["create_pdf_presentation()"],
    deps:["reportlab"]
  },
  { id:"MongoDB", group:"db", label:"MongoDB", size:22,
    desc:"MongoDB Atlas database (motor async driver). 4 collections: users, presentations, generation_logs, settings. SHA-256 content hash enables presentation caching.",
    risk:"high",
    notes:"Indexes: users.email (unique), presentations.content_hash, presentations.user_id. Cache key = SHA-256(title+topics+tone+theme). Images stripped from DB storage to save space — re-fetched on download."
  },
  { id:"users_col", group:"db", label:"users", size:13,
    desc:"Users collection. Fields: email (unique), password (bcrypt hash), full_name, role (user/admin/master), status (active/pending/rejected), created_at. Admin registrations start as 'pending'."
  },
  { id:"presentations_col", group:"db", label:"presentations", size:15,
    desc:"Presentations collection. Fields: user_id (ObjectId), username, title, topics[], content_hash, slides[] (JSON without base64 images), theme, created_at."
  },
  { id:"gen_logs_col", group:"db", label:"generation_logs", size:12,
    desc:"Generation audit log. Fields: user_id, presentation_id, action, status (success/cache_hit), execution_time_ms, timestamp."
  },
  { id:"settings_col", group:"db", label:"settings", size:12,
    desc:"Global config. Single doc {id:'global_config'}: image_generation_enabled (bool), speaker_notes_enabled (bool), default_model ('groq'|'nvidia')."
  },
  { id:"App.tsx", group:"frontend", label:"App.tsx", size:26,
    file:"frontend/src/App.tsx", lines:"~900",
    desc:"Root React component. Contains Three.js animated background, custom cursor, full generation form, slide editor, preview panel, presentation history browser, and admin panel.",
    risk:"high",
    functions:["ThreeBackground()","Cursor()","App()","handleGenerate()","handleExportPptx()","handleExportPdf()","handleRegenerateSlide()","handleRegenerateImage()"],
    deps:["AuthContext.tsx","Login.tsx","Signup.tsx","Three.js","API_BASE"]
  },
  { id:"AuthContext.tsx", group:"frontend", label:"AuthContext.tsx", size:18,
    file:"frontend/src/AuthContext.tsx", lines:"69",
    desc:"React Context for auth state. Provides: user, token, login(), logout(), isAuthenticated, loading. Persists to localStorage (auth_token, auth_user keys).",
    risk:"med",
    functions:["AuthProvider()","useAuth()"],
    deps:[]
  },
  { id:"Login.tsx", group:"frontend", label:"Login.tsx", size:15,
    file:"frontend/src/components/Login.tsx",
    desc:"Login form. Role selector: employee/admin/master. Calls POST /auth/login, stores JWT via useAuth().login().",
    deps:["AuthContext.tsx"]
  },
  { id:"Signup.tsx", group:"frontend", label:"Signup.tsx", size:14,
    file:"frontend/src/components/Signup.tsx",
    desc:"Registration form. Calls POST /auth/register. Admin accounts start pending until master approval.",
    deps:["AuthContext.tsx"]
  },
  { id:"SkynetBackground.tsx", group:"frontend", label:"SkynetBg.tsx", size:12,
    file:"frontend/src/components/SkynetBackground.tsx",
    desc:"Three.js animated background: icosahedra wireframes, torus rings, 650-point particle field, grid plane — mouse-interactive parallax.",
    deps:["Three.js"]
  },
  { id:"analytics.ts", group:"frontend", label:"analytics.ts", size:10,
    file:"frontend/src/lib/analytics.ts",
    desc:"Client-side analytics utility library.", deps:[]
  },
  { id:"utils.ts", group:"frontend", label:"utils.ts", size:10,
    file:"frontend/src/lib/utils.ts",
    desc:"Shared utility functions (classnames, formatting, etc.).", deps:[]
  },
  { id:"Groq API", group:"external", label:"Groq API", size:16,
    desc:"Groq Cloud. Model: llama-3.3-70b-versatile. Default LLM provider. Max 6000 tokens output. Temperature varies by tone.",
    notes:"Backend rate limit: 10 generate calls/min. Tone temps — professional:0.5, creative:0.8, technical:0.3, educational:0.6."
  },
  { id:"NVIDIA NIM API", group:"external", label:"NVIDIA NIM", size:14,
    desc:"NVIDIA NIM inference. Model: moonshotai/kimi-k2-instruct. Used for technical topics when NVIDIA_API_KEY is set. Max temp 0.35.",
    notes:"Activated when: NVIDIA_API_KEY present AND is_technical_topic() returns True. Falls back to Groq on any failure."
  },
  { id:"Freepik API", group:"external", label:"Freepik", size:12,
    desc:"Freepik image API. Priority 1 in cascade. Real photography. Requires paid/trial key.",
    notes:"Timeout: 10s. Returns preview URL fetched in a second request."
  },
  { id:"Unsplash API", group:"external", label:"Unsplash", size:12,
    desc:"Unsplash photo API. Priority 2. Free tier: 50 req/hr. Landscape orientation, high content filter.",
    notes:"Timeout: 10s + 15s for image download."
  },
  { id:"Pollinations.ai", group:"external", label:"Pollinations", size:12,
    desc:"Free AI image generation (flux model). Priority 3 / final fallback. No API key required.",
    notes:"Timeout: 60s. Output: 1344×768. Min 5000 byte check filters failed responses."
  },
  { id:"JWT", group:"external", label:"JWT Auth", size:14,
    desc:"PyJWT HS256 tokens. 24-hour expiry. Payload: {sub, user_id, username, role, status}.",
    notes:"3 auth guards: get_current_user (any valid token), require_admin (ADMIN|MASTER), require_master (master email only). Hierarchical: admin can access user view."
  },
  { id:"bcrypt", group:"external", label:"bcrypt", size:10,
    desc:"bcrypt password hashing via py-bcrypt. Used in get_password_hash() and verify_password()."
  },
  { id:"template.pptx", group:"external", label:"template.pptx", size:12,
    desc:"Base PPTX template. 2 slides: [0]=Title layout, [1]=Content layout. All new slides are duplicated from these to preserve embedded image relationship IDs.",
    notes:"Required at backend/template.pptx — raises FileNotFoundError if missing. The _duplicate_slide_within() approach (same Presentation object) is critical for media part integrity."
  },
];

const links = [
  {source:"main.py", target:"generator.py",      type:"import"},
  {source:"main.py", target:"pdf_generator.py",  type:"import"},
  {source:"main.py", target:"llm_client.py",     type:"import"},
  {source:"main.py", target:"image_client.py",   type:"import"},
  {source:"main.py", target:"MongoDB",           type:"calls"},
  {source:"main.py", target:"JWT",               type:"calls"},
  {source:"main.py", target:"bcrypt",            type:"calls"},
  {source:"generator.py",   target:"template.pptx",   type:"import"},
  {source:"llm_client.py",  target:"Groq API",         type:"calls"},
  {source:"llm_client.py",  target:"NVIDIA NIM API",   type:"calls"},
  {source:"image_client.py",target:"Freepik API",      type:"calls"},
  {source:"image_client.py",target:"Unsplash API",     type:"calls"},
  {source:"image_client.py",target:"Pollinations.ai",  type:"calls"},
  {source:"MongoDB", target:"users_col",          type:"extends"},
  {source:"MongoDB", target:"presentations_col",  type:"extends"},
  {source:"MongoDB", target:"gen_logs_col",       type:"extends"},
  {source:"MongoDB", target:"settings_col",       type:"extends"},
  {source:"App.tsx", target:"AuthContext.tsx",     type:"import"},
  {source:"App.tsx", target:"Login.tsx",           type:"import"},
  {source:"App.tsx", target:"Signup.tsx",          type:"import"},
  {source:"App.tsx", target:"SkynetBackground.tsx",type:"import"},
  {source:"App.tsx", target:"analytics.ts",        type:"import"},
  {source:"Login.tsx",  target:"AuthContext.tsx",  type:"import"},
  {source:"Signup.tsx", target:"AuthContext.tsx",  type:"import"},
  {source:"App.tsx",    target:"main.py",          type:"api"},
  {source:"Login.tsx",  target:"main.py",          type:"api"},
  {source:"Signup.tsx", target:"main.py",          type:"api"},
];

// ── D3 Setup ──────────────────────────────────────────────────────────────────
const svg = d3.select("#graph");
const g   = svg.append("g").attr("id","main-g");
let showLinks = true;

const defs = svg.append("defs");
["import","calls","extends","api"].forEach(type => {
  defs.append("marker")
    .attr("id",`arrow-${type}`)
    .attr("viewBox","0 -4 8 8")
    .attr("refX",20).attr("refY",0)
    .attr("markerWidth",6).attr("markerHeight",6)
    .attr("orient","auto")
    .append("path").attr("d","M0,-4L8,0L0,4")
    .attr("fill", LINK_COLOR[type]).attr("fill-opacity",0.7);
});

const glowFilter = defs.append("filter").attr("id","glow");
glowFilter.append("feGaussianBlur").attr("stdDeviation","3").attr("result","blur");
const fm = glowFilter.append("feMerge");
fm.append("feMergeNode").attr("in","blur");
fm.append("feMergeNode").attr("in","SourceGraphic");

const zoom = d3.zoom().scaleExtent([0.15, 3])
  .on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

function resetZoom() {
  const w = document.getElementById("svg-container").clientWidth;
  const h = document.getElementById("svg-container").clientHeight;
  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(w/2, h/2).scale(0.7));
}
function toggleLinks() {
  showLinks = !showLinks;
  g.selectAll(".link").style("display", showLinks ? null : "none");
}

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(d=>{
    if(d.type==="extends") return 80;
    if(d.type==="api")     return 260;
    return 150;
  }).strength(0.35))
  .force("charge", d3.forceManyBody().strength(-700))
  .force("collide", d3.forceCollide().radius(d=>d.size+20))
  .force("cluster_x", d3.forceX(d=>{
    const m = {entry:-50, backend:-220, db:-60, frontend:240, external:10};
    return m[d.group] ?? 0;
  }).strength(0.13))
  .force("cluster_y", d3.forceY(d=>{
    const m = {entry:-190, backend:-60, db:170, frontend:-60, external:210};
    return m[d.group] ?? 0;
  }).strength(0.13))
  .alphaDecay(0.025);

const link = g.append("g")
  .selectAll("line").data(links).join("line")
  .attr("class", d=>`link ${d.type}`)
  .attr("stroke", d=>LINK_COLOR[d.type])
  .attr("stroke-width", d=>d.type==="api"?1.8:1.2)
  .attr("stroke-dasharray", d=>({import:null,calls:"5 2",extends:null,api:"8 3"})[d.type])
  .attr("stroke-opacity", 0.5)
  .attr("marker-end", d=>`url(#arrow-${d.type})`);

const node = g.append("g")
  .selectAll("g").data(nodes).join("g")
  .attr("class","node")
  .call(d3.drag()
    .on("start",(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", (e,d)=>{ d.fx=e.x; d.fy=e.y; })
    .on("end",  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  );

node.append("circle")
  .attr("r", d=>d.size)
  .attr("fill", d=>COLOR[d.group])
  .attr("fill-opacity", 0.15)
  .attr("stroke", d=>COLOR[d.group])
  .attr("stroke-width", d=>d.group==="entry"?2.8:1.8)
  .attr("filter","url(#glow)");

node.append("text")
  .text(d=>d.label)
  .attr("text-anchor","middle")
  .attr("dy", d=>d.size+14)
  .attr("font-size", d=>d.size>20?12:10)
  .attr("fill", d=>COLOR[d.group]);

const tooltip = document.getElementById("tooltip");
node
  .on("mouseover",(e,d)=>{
    tooltip.style.display="block";
    tooltip.style.left=(e.clientX+14)+"px";
    tooltip.style.top=(e.clientY-10)+"px";
    tooltip.innerHTML=`<strong style="color:${COLOR[d.group]}">${d.label}</strong><br/><span style="color:#64748b">${d.file||d.group.toUpperCase()}</span>`;
  })
  .on("mousemove",e=>{
    tooltip.style.left=(e.clientX+14)+"px";
    tooltip.style.top=(e.clientY-10)+"px";
  })
  .on("mouseout",()=>{ tooltip.style.display="none"; })
  .on("click",(e,d)=>{
    e.stopPropagation();
    link.attr("stroke-opacity", l=>(l.source.id===d.id||l.target.id===d.id)?1:0.1);
    node.select("circle").attr("stroke-width", n=>n.id===d.id?3.5:1.8);

    const riskBadge = d.risk
      ? `<span class="badge ${d.risk==="high"?"risk-high":d.risk==="med"?"risk-med":"risk-low"}">${d.risk} risk</span>`
      : "";
    const grpColor = COLOR[d.group]||"#475569";
    const grpBadge = `<span class="badge" style="background:${grpColor}22;color:${grpColor};border:1px solid ${grpColor}44">${d.group}</span>`;

    let h = `<h3>${d.label}</h3><div style="margin-bottom:8px">${grpBadge} ${riskBadge}</div>`;
    if(d.file) h+=`<div style="font-size:10px;color:#475569;margin-bottom:8px;font-family:Consolas">${d.file}${d.lines?" ("+d.lines+" lines)":""}</div>`;
    h+=`<p>${d.desc||""}</p>`;
    if(d.notes) h+=`<div class="section"><h3>Notes</h3><p style="color:#7dd3fc">${d.notes}</p></div>`;
    if(d.functions?.length){
      h+=`<div class="section"><h3>Functions / Methods</h3><div class="fn-list">`;
      d.functions.forEach(f=>{ h+=`<span class="fn-item">${f}</span>`; });
      h+=`</div></div>`;
    }
    if(d.endpoints?.length){
      h+=`<div class="section"><h3>API Endpoints</h3>`;
      d.endpoints.forEach(ep=>{
        h+=`<div class="endpoint"><span class="method method-${ep.method.toLowerCase()}">${ep.method}</span><span style="color:#e2e8f0;font-family:Consolas;font-size:11px">${ep.path}</span></div>`;
      });
      h+=`</div>`;
    }
    if(d.deps?.length){
      h+=`<div class="section"><h3>Dependencies</h3>`;
      d.deps.forEach(dep=>{ h+=`<span class="dep-item">${dep}</span>`; });
      h+=`</div>`;
    }
    const out = links.filter(l=>(l.source.id||l.source)===d.id);
    const inc = links.filter(l=>(l.target.id||l.target)===d.id);
    if(out.length||inc.length){
      h+=`<div class="section"><h3>Relationships</h3>`;
      out.forEach(l=>{
        const t=typeof l.target==="object"?l.target.id:l.target;
        h+=`<span class="dep-item" style="border-left:2px solid ${LINK_COLOR[l.type]}">→ ${t} <span style="color:#475569">(${l.type})</span></span>`;
      });
      inc.forEach(l=>{
        const s=typeof l.source==="object"?l.source.id:l.source;
        h+=`<span class="dep-item" style="border-left:2px solid ${LINK_COLOR[l.type]};opacity:.7">← ${s} <span style="color:#475569">(${l.type})</span></span>`;
      });
      h+=`</div>`;
    }

    document.getElementById("panel").querySelector("h2").textContent = d.label;
    document.getElementById("panel-content").innerHTML = h;
  });

svg.on("click",()=>{
  link.attr("stroke-opacity",0.5);
  node.select("circle").attr("stroke-width",d=>d.group==="entry"?2.8:1.8);
});

sim.on("tick",()=>{
  link
    .attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
    .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform",d=>`translate(${d.x},${d.y})`);
});

setTimeout(resetZoom, 120);
</script>
</body>
</html>
