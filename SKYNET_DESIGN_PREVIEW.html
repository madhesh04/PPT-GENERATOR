/* ── Neural Network BG ── */
function NeuralBG(){
  const r=useRef(null);
  useEffect(()=>{
    const c=r.current;if(!c)return;
    const ctx=c.getContext('2d');
    const resize=()=>{c.width=c.offsetWidth;c.height=c.offsetHeight;};
    resize();
    const N=Array.from({length:85},()=>({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.38,vy:(Math.random()-.5)*.38,r:Math.random()*1.5+.5}));
    let aid;
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      for(let i=0;i<N.length;i++)for(let j=i+1;j<N.length;j++){
        const dx=N[i].x-N[j].x,dy=N[i].y-N[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<135){ctx.beginPath();ctx.moveTo(N[i].x,N[i].y);ctx.lineTo(N[j].x,N[j].y);ctx.strokeStyle=`rgba(61,90,254,${.15*(1-d/135)})`;ctx.lineWidth=.5;ctx.stroke();}
      }
      N.forEach(n=>{
        ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle='rgba(61,90,254,0.8)';ctx.fill();
        n.x+=n.vx;n.y+=n.vy;
        if(n.x<0||n.x>c.width)n.vx*=-1;if(n.y<0||n.y>c.height)n.vy*=-1;
      });
      aid=requestAnimationFrame(draw);
    };
    draw();return()=>cancelAnimationFrame(aid);
  },[]);
  return React.createElement('canvas',{ref:r,style:{position:'absolute',inset:0,width:'100%',height:'100%'}});
}

/* ── Targeting Reticle BG ── */
function ReticleBG(){
  const r=useRef(null);
  useEffect(()=>{
    const c=r.current;if(!c)return;
    const ctx=c.getContext('2d');
    c.width=c.offsetWidth;c.height=c.offsetHeight;
    let angle=0,scanY=0,aid;
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      const cx=c.width*.68,cy=c.height*.5,R=Math.min(c.width,c.height)*.33;
      for(let x=0;x<c.width;x+=50)for(let y=0;y<c.height;y+=50){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fillStyle='rgba(211,47,47,0.06)';ctx.fill();}
      [1,.7,.45,.22].forEach((v,i)=>{ctx.beginPath();ctx.arc(cx,cy,R*v,0,Math.PI*2);ctx.strokeStyle=`rgba(211,47,47,${.07+i*.04})`;ctx.lineWidth=i===0?1.5:.5;ctx.stroke();});
      [[angle,angle+.9],[angle+Math.PI,angle+Math.PI+.9]].forEach(([a1,a2])=>{ctx.beginPath();ctx.arc(cx,cy,R*1.1,a1,a2);ctx.strokeStyle='rgba(211,47,47,0.75)';ctx.lineWidth=1.5;ctx.stroke();});
      ctx.strokeStyle='rgba(211,47,47,0.18)';ctx.lineWidth=.5;ctx.setLineDash([6,10]);
      ctx.beginPath();ctx.moveTo(cx-R*1.5,cy);ctx.lineTo(cx+R*1.5,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-R*1.5);ctx.lineTo(cx,cy+R*1.5);ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();ctx.arc(cx,cy,3.5,0,Math.PI*2);ctx.fillStyle='rgba(211,47,47,0.9)';ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.strokeStyle='rgba(211,47,47,0.35)';ctx.lineWidth=.8;ctx.stroke();
      scanY=(scanY+.7)%c.height;
      const g=ctx.createLinearGradient(0,scanY-70,0,scanY+2);
      g.addColorStop(0,'rgba(211,47,47,0)');g.addColorStop(1,'rgba(211,47,47,0.055)');
      ctx.fillStyle=g;ctx.fillRect(0,scanY-70,c.width,72);
      angle+=.005;aid=requestAnimationFrame(draw);
    };
    draw();return()=>cancelAnimationFrame(aid);
  },[]);
  return React.createElement('canvas',{ref:r,style:{position:'absolute',inset:0,width:'100%',height:'100%'}});
}

function Ico({name,size=16,color='currentColor'}){
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{ICONS[name]}</svg>;
}

      <div style={{fontFamily:T.fm,fontSize:9,color:T.t2}}>{sub}</div>

}

      <div style={{fontFamily:T.fm,fontSize:9,color:T.t2,marginBottom:16}}>// CLEARANCE_REQUIRED — Elevated access controls active</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
        <StatCard label="TOTAL_USERS" value="24" sub="Registered accounts" color={T.adm} barW="100%"/>
        <StatCard label="PENDING_APPROVAL" value="4" sub="Awaiting review" color={T.amb} barW="16%"/>
        <StatCard label="GLOBAL_GENERATIONS" value="1,847" sub="All-time PPTs" color={T.emp} barW="100%"/>
        <StatCard label="SUSPENDED_USERS" value="2" sub="Access revoked" color={T.t2} barW="8%"/>
      </div>
      <div style={{display:'flex',gap:2,borderBottom:`1px solid ${T.b1}`,marginBottom:16}}>
        {['overview','users','generations','pending'].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:'8px 16px',background:'transparent',border:'none',borderBottom:tab===t?`2px solid ${T.adm}`:'2px solid transparent',fontFamily:T.fm,fontSize:9,letterSpacing:'.12em',color:tab===t?T.adm:T.t3,cursor:'pointer',marginBottom:-1}}>{t.toUpperCase()}</button>
        ))}
      </div>
      {tab==='overview'&&(
        <div style={{background:T.bg2,border:`1px solid ${T.admB}`,borderRadius:10,padding:18}}>
          <div style={{fontFamily:T.fm,fontSize:9,color:T.adm,letterSpacing:'.12em',marginBottom:12}}>// ADMIN_ACTIVITY_LOG</div>
          {[{time:'12:47:03',action:'USER_APPROVED',target:'ananya@skynet.ai',actor:'ADMIN'},{time:'11:23:44',action:'ROLE_CHANGED → ADMIN',target:'priya@skynet.ai',actor:'MASTER'},{time:'09:15:12',action:'USER_SUSPENDED',target:'ravi@skynet.ai',actor:'ADMIN'},{time:'08:02:55',action:'GENERATION_DELETED',target:'PPT#8472',actor:'ADMIN'}].map((log,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:14,padding:'8px 0',borderBottom:`1px solid ${T.b0}`,fontFamily:T.fm,fontSize:9}}>
              <span style={{color:T.t3,minWidth:62}}>{log.time}</span>
              <span style={{color:T.adm,minWidth:200}}>{log.action}</span>
              <span style={{color:T.t2}}>{log.target}</span>
              <span style={{marginLeft:'auto',color:T.t3}}>by {log.actor}</span>
            </div>
          ))}
        </div>
      )}
      {tab==='users'&&(
        <div style={{background:T.bg2,border:`1px solid ${T.b1}`,borderRadius:10,overflow:'hidden'}}>
          <div style={{padding:'12px 18px',borderBottom:`1px solid ${T.b0}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontFamily:T.fm,fontSize:9,color:T.t2,letterSpacing:'.1em'}}>// USER_MANAGEMENT — {USERS.length} accounts</div>
            <button style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',background:T.admD,border:`1px solid ${T.admB}`,borderRadius:5,fontFamily:T.fm,fontSize:8,color:T.adm,cursor:'pointer',letterSpacing:'.1em'}}><Ico name="plus" size={10} color={T.adm}/>CREATE_USER</button>
          </div>
          <table style={{width:'100%'}}>
            <thead><tr style={{borderBottom:`1px solid ${T.b0}`}}>{['USER','ROLE','STATUS','PPTs','JOINED','ACTIONS'].map(h=><th key={h} style={{fontFamily:T.fm,fontSize:8,color:T.t3,letterSpacing:'.1em',padding:'9px 14px',textAlign:'left',fontWeight:400}}>{h}</th>)}</tr></thead>
            <tbody>{USERS.map((u,i)=>(
              <tr key={i} style={{borderBottom:`1px solid ${T.b0}`}}>
                <td style={{padding:'11px 14px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:9}}>
                    <div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,${T.emp}80,${T.emp})`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:T.fm,fontSize:9,color:'#fff',flexShrink:0}}>{u.name.split(' ').map(w=>w[0]).join('')}</div>
                    <div><div style={{fontFamily:T.fm,fontSize:10,color:T.t1}}>{u.name}</div><div style={{fontFamily:T.fm,fontSize:8,color:T.t3}}>{u.email}</div></div>
                  </div>
                </td>
                <td style={{padding:'11px 14px'}}><span style={{fontFamily:T.fm,fontSize:8,color:RC(u.role),background:`${RC(u.role)}15`,border:`1px solid ${RC(u.role)}40`,padding:'2px 7px',borderRadius:4}}>{u.role}</span></td>
                <td style={{padding:'11px 14px'}}><div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:5,height:5,borderRadius:'50%',background:SC(u.status)}}/><span style={{fontFamily:T.fm,fontSize:9,color:SC(u.status)}}>{u.status.toUpperCase()}</span></div></td>
                <td style={{fontFamily:T.fm,fontSize:10,color:T.t2,padding:'11px 14px'}}>{u.ppts}</td>
                <td style={{fontFamily:T.fm,fontSize:9,color:T.t3,padding:'11px 14px'}}>{u.joined}</td>
                <td style={{padding:'11px 14px'}}>
                  <div style={{display:'flex',gap:5}}>
                    <button style={{padding:'3px 9px',background:T.empD,border:`1px solid ${T.empB}`,borderRadius:4,fontFamily:T.fm,fontSize:8,color:T.emp,cursor:'pointer'}}>EDIT</button>
                    <button style={{padding:'3px 9px',background:T.admD,border:`1px solid ${T.admB}`,borderRadius:4,fontFamily:T.fm,fontSize:8,color:T.adm,cursor:'pointer'}}>DEL</button>
                  </div>
                </td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      )}
      {(tab==='generations'||tab==='pending')&&(
        <div style={{background:T.bg2,border:`1px solid ${T.b1}`,borderRadius:10,padding:50,textAlign:'center'}}>
          <div style={{fontFamily:T.fm,fontSize:10,color:T.t3,letterSpacing:'.12em'}}>{tab==='generations'?'// GLOBAL_GENERATIONS — Loading generation logs…':'// PENDING_APPROVALS — 4 users awaiting clearance'}</div>
        </div>
      )}
    </AppLayout>
  );
}

/* ── Root ── */
const SCREENS=[
  {id:'AUTH_EMP',label:'Login — Employee'},
  {id:'AUTH_ADM',label:'Login — Admin'},
  {id:'DASHBOARD',label:'Dashboard'},
  {id:'CREATOR',label:'Create PPT'},
  {id:'HISTORY',label:'History'},
  {id:'ADMIN',label:'Admin Panel'},
];

function App(){
  const [screen,setScreen]=useState('AUTH_EMP');
  const [loginMode,setLoginMode]=useState('employee');
  const handleMode=m=>{setLoginMode(m);setScreen(m==='admin'?'AUTH_ADM':'AUTH_EMP');};
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:T.bg0}}>
      {/* Screen switcher bar */}
      <div style={{height:38,background:'rgba(2,4,10,0.98)',borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',alignItems:'center',padding:'0 14px',gap:5,flexShrink:0,zIndex:9999}}>
        <span style={{fontFamily:T.fm,fontSize:8,color:'#354060',letterSpacing:'.12em',marginRight:6}}>SKYNET DESIGN PREVIEW v2.5 //</span>
        {SCREENS.map(s=>(
          <button key={s.id} onClick={()=>{setScreen(s.id);if(s.id==='AUTH_ADM')setLoginMode('admin');else if(s.id==='AUTH_EMP')setLoginMode('employee');}} style={{padding:'4px 12px',background:screen===s.id?'rgba(61,90,254,0.14)':'transparent',border:`1px solid ${screen===s.id?'rgba(61,90,254,0.4)':'rgba(255,255,255,0.07)'}`,borderRadius:4,color:screen===s.id?'#3D5AFE':'#354060',fontFamily:T.fm,fontSize:9,letterSpacing:'.07em',cursor:'pointer',transition:'all .15s'}}>
            {s.label}
          </button>
        ))}
        <div style={{marginLeft:'auto',fontFamily:T.fm,fontSize:8,color:'#354060'}}>Click tabs to switch screens →</div>
      </div>
      <div style={{flex:1,overflow:'hidden'}}>
        {(screen==='AUTH_EMP'||screen==='AUTH_ADM')&&<AuthScreen loginMode={loginMode} setLoginMode={handleMode}/>}
        {screen==='DASHBOARD'&&<DashboardScreen/>}
        {screen==='CREATOR'&&<CreatorScreen/>}
        {screen==='HISTORY'&&<HistoryScreen/>}
        {screen==='ADMIN'&&<AdminScreen/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
